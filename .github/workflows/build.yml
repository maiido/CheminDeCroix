name: Build Electron app

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: --linux AppImage
          - os: windows-latest
            args: --win
          - os: macos-latest
            args: --mac

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3

      - name: Configure Windows build tools
        if: runner.os == 'Windows'
        run: |
          npm config set msvs_version 2022
          npm config set python python

      - name: Install dependencies
        run: npm ci

      - name: Build sources
        run: npm run electron:build

      - name: Package with electron-builder
        run: npx --no-install electron-builder ${{ matrix.args }} --publish never

      - name: Add macOS readme
        if: runner.os == 'macOS'
        run: bash scripts/add-mac-readme.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: chemindecroix-${{ matrix.os }}
          path: release/*
          if-no-files-found: error
